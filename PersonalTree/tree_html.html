<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>ASCII Runner</title>
  <link rel="stylesheet" href="./tree_css.css">
</head>
<body>

  <div id="game-container">
    <h1>ASCII Runner</h1>
    <div id="space"></div>
    <pre id="game-border"></pre>
    <div id="ui">
      <p id="messages"></p>
      <p>Controls:</p>
      <p>W = Walk | Space = Fly | S = Swim | C = Climb | T = Crawl</p>
    </div>

    <div class="play-box">
      <div id="play">
      <h1> Play </h1>
      </div>
    </div>
    
  </div>

  <input 
    id="hiddenInput" 
    type="text" 
    style="position:absolute; left:-1000px;"
    autocapitalize="off"
    autocomplete="off"
    autocorrect="off"
    spellcheck="false"
  >
  <script src="./tree_js.js"></script>
</body>
</html>
