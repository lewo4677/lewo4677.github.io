<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ASCII Runner</title>
  <link rel="stylesheet" href="./tree_css.css">
</head>
<body>
<input id="mobileInput" type="text" style="position:absolute; opacity:0;" autofocus>
  <div id="game-container">
    <h1>ASCII Runner</h1>
    <div id="space"></div>
    <pre id="game-border"></pre>
    <div id="ui">
      <p id="messages"></p>
      <p>Controls:</p>
      <p>W = Walk | Space = Fly | S = Swim | C = Climb | T = Crawl</p>
    </div>

    <div class="play-box">
      <div id="play">
      <h1> Play </h1>
      </div>
    </div>
    
  </div>

  <script src="./tree_js.js"></script>
</body>
</html>
